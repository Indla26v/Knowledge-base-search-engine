server:
  port: 8080 # Changed to 8080 to not conflict with default Python app if it was on 8000. Let frontend connect to 8080. Or adjust as needed.

spring:
  application:
    name: rag-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:your-api-key-here}
      chat:
        options:
          model: claude-haiku-4-5
    vectorstore:
      chroma:
        client:
          host: ${CHROMA_HOST:http://127.0.0.1}
          port: ${CHROMA_PORT:8000}
        collection-name: default_collection
        initialize-schema: true
